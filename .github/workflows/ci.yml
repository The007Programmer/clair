name: CI

# Enforces the project's two invariants on every push to main and every PR:
#   1. `python -m clair status scan` — base-purity + secrets gate (non-zero exit fails the job)
#   2. `python -m pytest`     — the full test suite (pytest is the only dependency)
#
# Note: `.clair/purity-terms.txt` is gitignored, so in CI the purity scan runs with the
# default (empty) company-term list. It still enforces the secret-file and home-path
# checks, and the test suite still runs in full. That is intended.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Package targets py>=3.9; test the floor and a modern release.
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Scan (base purity + secrets gate)
        run: python -m clair status scan
      - name: Run tests
        run: python -m pytest -q
